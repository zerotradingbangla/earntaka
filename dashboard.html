<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Title */
.title {
  font-size: 30px;
  color: white;
  margin-top: 20px;
}

/* Card */
.card {
  background: rgba(255,255,255,0.9);
  padding: 20px;
  margin: 20px;
  display: inline-block;
  width: 200px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* Button */
button {
  padding: 10px;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: white;
  border: none;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1 class="title">🔥 Premium Card Shop 🔥</h1>

<div class="card">
<h3>Elite Premium Card</h3>
<p>Price: $3</p>
<button>Buy Now</button>
</div>

<div class="card">
<h3>Premium Card</h3>
<p>Price: $2</p>
<button>Buy Now</button>
</div>

<div class="card">
<h3>Basic Card</h3>
<p>Price: $1</p>
<button>Buy Now</button>
</div>

</body>
</html>

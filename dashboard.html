<!DOCTYPE html>
<html>
<head>
<title>Ultra Trading Pro</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0e11;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #161a1e;
  padding: 10px;
  height: 100vh;
  overflow-y: scroll;
}

.sidebar h3 {
  color: #f0b90b;
  text-align: center;
}

.company {
  font-size: 12px;
  margin: 4px 0;
}

.green { color: #00ff88; }
.red { color: red; }

/* MAIN */
.main {
  flex: 1;
  padding: 10px;
}

/* HEADER */
.header {
  text-align: center;
  color: #f0b90b;
  font-size: 22px;
}

/* BALANCE */
.balance {
  text-align: center;
  margin: 10px;
  font-size: 18px;
  color: #00ffc3;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #161a1e;
  margin: 10px;
  padding: 15px;
  width: 160px;
  text-align: center;
  border-radius: 10px;
}

button {
  margin-top: 8px;
  padding: 8px;
  width: 100%;
  background: #f0b90b;
  border: none;
}

/* CHART */
#chart {
  height: 500px;
  margin-top: 10px;
}

/* ORDERBOOK */
.orderbook {
  display: flex;
}

.buy, .sell {
  width: 50%;
  height: 400px;
  overflow-y: scroll;
  padding: 10px;
}

.buy p { color: #00ff88; }
.sell p { color: red; }

/* WITHDRAW */
.withdraw {
  text-align: center;
  margin-top: 10px;
}

.withdraw input {
  padding: 8px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>📊 Market Data</h3>
<div id="companies"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">🔥 LIVE TRADING SYSTEM 🔥</div>

<div class="balance" id="bal">Balance: $10</div>

<div class="cards">

<div class="card">
ELITE
<p id="p1">$3.00</p>
<p id="s1" class="green">UP</p>
<button onclick="pay(3)">Buy</button>
</div>

<div class="card">
PREMIUM
<p id="p2">$2.00</p>
<p id="s2" class="green">UP</p>
<button onclick="pay(2)">Buy</button>
</div>

<div class="card">
BASIC
<p id="p3">$1.00</p>
<p id="s3" class="green">UP</p>
<button onclick="pay(1)">Buy</button>
</div>

<div class="card">
ELITE PREMIUM
<p id="p4">$50.00</p>
<p id="s4" class="green">UP</p>
<button onclick="pay(50)">Buy</button>
</div>

</div>

<!-- CHART -->
<div id="chart"></div>

<!-- ORDER BOOK -->
<div class="orderbook">
<div class="buy" id="buy"></div>
<div class="sell" id="sell"></div>
</div>

<!-- WITHDRAW -->
<div class="withdraw">
<h3>Withdraw</h3>
<input id="amount" placeholder="Enter amount">
<button onclick="withdraw()">Withdraw</button>
</div>

</div>

<script>

/* BALANCE SYSTEM */
var balance = localStorage.getItem("balance") || 10;

function updateBalance(){
  document.getElementById("bal").innerText = "Balance: $" + balance;
}
updateBalance();

/* BUY SYSTEM */
function pay(price){

  if(balance >= price){
    balance -= price;
    localStorage.setItem("balance", balance);
    updateBalance();
    alert("Purchased Successfully!");
  } else {
    alert("Not enough balance");
  }

}

/* WITHDRAW SYSTEM */
function withdraw(){

  var amount = document.getElementById("amount").value;

  if(amount <= 0){
    alert("Invalid amount");
    return;
  }

  if(amount > balance){
    alert("Not enough balance");
    return;
  }

  balance -= amount;
  localStorage.setItem("balance", balance);
  updateBalance();

  alert("Withdraw request sent!");
}

/* TRADING VIEW */
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "1",
  "theme": "dark",
  "style": "1",
  "container_id": "chart"
});

/* PRICE SYSTEM */
var prices = [3,2,1,50];
var min = [2.90,1.95,1.00,48];
var max = [3.22,2.12,1.32,57];

function updatePrices(){
  for(let i=0;i<prices.length;i++){

    let change = (Math.random()*0.15 - 0.10);
    prices[i] += change;

    if(prices[i] < min[i]) prices[i] = min[i];
    if(prices[i] > max[i]) prices[i] = max[i];

    document.getElementById("p"+(i+1)).innerText =
      "$" + prices[i].toFixed(2);

    let s = document.getElementById("s"+(i+1));

    if(change > 0){
      s.innerText = "▲ UP";
      s.className = "green";
    } else {
      s.innerText = "▼ DOWN";
      s.className = "red";
    }
  }
}

/* MARKET LIST */
function updateCompanies(){
  let names = ["Binance","Bybit","KuCoin","OKX","Gate","Bitget","Huobi","Coinbase","Kraken","Bitfinex","MEXC","Deribit"];
  let html = "";

  for(let i=0;i<120;i++){
    let name = names[i % names.length];
    let up = Math.random()>0.5;
    let val = (Math.random()*10).toFixed(2);

    html += "<div class='company "+(up?"green":"red")+"'>"
    + name + " : " + (up?"+":"-") + val + "%</div>";
  }

  document.getElementById("companies").innerHTML = html;
}

/* ORDER BOOK */
function updateOrderBook(){
  let buyHTML = "<h4>BUY</h4>";
  let sellHTML = "<h4>SELL</h4>";

  for(let i=0;i<45;i++){
    buyHTML += "<p>$"+(Math.random()*5).toFixed(2)+"</p>";
    sellHTML += "<p>$"+(Math.random()*5).toFixed(2)+"</p>";
  }

  document.getElementById("buy").innerHTML = buyHTML;
  document.getElementById("sell").innerHTML = sellHTML;
}

/* LOOP */
setInterval(function(){
  updatePrices();
  updateCompanies();
  updateOrderBook();
},1000);

</script>

</body>
</html>

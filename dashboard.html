<!DOCTYPE html>
<html>
<head>
<title>Pro Trading</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0e11;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  background: #161a1e;
  padding: 15px;
}

.sidebar h3 {
  color: #f0b90b;
}

.sidebar p {
  margin: 10px 0;
}

/* MAIN */
.main {
  flex: 1;
  padding: 10px;
}

/* HEADER */
.header {
  text-align: center;
  color: #f0b90b;
}

/* CARDS */
.cards {
  display: flex;
}

.card {
  background: #161a1e;
  margin: 10px;
  padding: 15px;
  width: 150px;
  text-align: center;
  border-radius: 10px;
}

.up { color: #00ff88; }
.down { color: red; }

/* GRAPH */
#graph {
  width: 100%;
  height: 250px;
}

/* ORDER BOOK */
.orderbook {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.buy, .sell {
  width: 48%;
  background: #161a1e;
  padding: 10px;
}

.buy p { color: #00ff88; }
.sell p { color: red; }

/* BUTTON */
button {
  margin-top: 5px;
  padding: 8px;
  width: 100%;
  background: #f0b90b;
  border: none;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>📊 Binance UI</h3>
<p>Dashboard</p>
<p>Markets</p>
<p>Wallet</p>
<p>History</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">🔥 LIVE MARKET 🔥</div>

<div class="cards">

<div class="card">
ELITE
<p id="p1">$3.00</p>
<p id="s1" class="up">UP</p>
<button onclick="pay()">Buy</button>
</div>

<div class="card">
PREMIUM
<p id="p2">$2.00</p>
<p id="s2" class="up">UP</p>
<button onclick="pay()">Buy</button>
</div>

<div class="card">
BASIC
<p id="p3">$1.00</p>
<p id="s3" class="up">UP</p>
<button onclick="pay()">Buy</button>
</div>

</div>

<canvas id="graph"></canvas>

<div class="orderbook">

<div class="buy" id="buy"></div>
<div class="sell" id="sell"></div>

</div>

</div>

<script>
var prices = [3,2,1];
var min = [2.90,1.95,1.00];
var max = [3.22,2.12,1.32];

function updatePrices() {
  for(let i=0;i<3;i++) {

    let change = (Math.random()*0.15 - 0.10);
    prices[i] += change;

    if(prices[i] < min[i]) prices[i] = min[i];
    if(prices[i] > max[i]) prices[i] = max[i];

    document.getElementById("p"+(i+1)).innerText =
      "$" + prices[i].toFixed(2);

    let s = document.getElementById("s"+(i+1));

    if(change > 0){
      s.innerText = "▲ UP";
      s.className = "up";
    } else {
      s.innerText = "▼ DOWN";
      s.className = "down";
    }
  }

  updateOrderBook();
}

/* ORDER BOOK */
function updateOrderBook() {

  let buyHTML = "<h4>BUY</h4>";
  let sellHTML = "<h4>SELL</h4>";

  for(let i=0;i<5;i++) {
    buyHTML += "<p>$"+(Math.random()*3).toFixed(2)+"</p>";
    sellHTML += "<p>$"+(Math.random()*3).toFixed(2)+"</p>";
  }

  document.getElementById("buy").innerHTML = buyHTML;
  document.getElementById("sell").innerHTML = sellHTML;
}

/* GRAPH */
var canvas = document.getElementById("graph");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 250;

var data = [];
for(let i=0;i<100;i++) data.push(150);

function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "#f0b90b";

  for(let i=0;i<data.length;i++) {
    ctx.lineTo(i*10, data[i]);
  }

  ctx.stroke();

  data.shift();
  data.push(data[data.length-1] + (Math.random()*10-5));
}

/* BKASH */
function pay(){
  window.location.href = "https://www.bkash.com/";
}

setInterval(function(){
  updatePrices();
  drawGraph();
},1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: Arial;
}

.box {
  width: 320px;
  margin: 100px auto;
  background: white;
  padding: 25px;
  text-align: center;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
}

a {
  display: block;
  margin-top: 10px;
  color: #667eea;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="create.html">Create Account</a>
<a href="#">Forgot Password?</a>
</div>
<script>
function login() {
  var email = document.querySelector('input[type="text"]').value;
  var pass = document.querySelector('input[type="password"]').value;

  if(email == "" || pass == "") {
    alert("Please fill all fields!");
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>
</body>
</html>

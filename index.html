<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
  background-size: 400% 400%;
  animation: bgMove 10s infinite alternate;
}

/* BG ANIMATION */
@keyframes bgMove {
  0% { background-position: left; }
  100% { background-position: right; }
}

/* LEFT SIDE (INFO) */
.left {
  width: 60%;
  padding: 50px;
  color: white;
}

.left h1 {
  font-size: 40px;
  color: #00ffc3;
  text-shadow: 0 0 10px #00ffc3;
}

.left p {
  margin-top: 20px;
  color: #ccc;
}

/* LIVE STATS */
.stats {
  margin-top: 40px;
}

.stat {
  margin: 15px 0;
  font-size: 18px;
}

/* RIGHT LOGIN BOX */
.right {
  width: 40%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  width: 300px;
  border-radius: 15px;
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 0 25px rgba(0,255,200,0.3);
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 95%;
  padding: 12px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

a {
  display: block;
  margin-top: 10px;
  color: #00ffc3;
}
</style>

</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
<h1>🚀 Smart Trading Platform</h1>
<p>Trade smarter. Earn faster. Grow your income with our premium system.</p>

<div class="stats">
<div class="stat" id="users">👥 Users: 1200</div>
<div class="stat" id="profit">💰 Profit: $5000</div>
<div class="stat" id="trades">📊 Trades: 320</div>
</div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
<div class="box">

<h2 style="color:#00ffc3;">🔐 Login</h2>

<input type="text" id="number" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="create.html">Create Account</a>
<a href="otp.html">Forgot Password?</a>

</div>
</div>

<script>
// LOGIN
function login() {
  var number = document.getElementById("number").value;
  var pass = document.getElementById("password").value;

  var savedNumber = localStorage.getItem("number");
  var savedPass = localStorage.getItem("password");

  if(savedNumber == null) {
    alert("Create account first!");
    return;
  }

  if(number == savedNumber && pass == savedPass) {
    window.location.href = "dashboard.html";
  } else {
    alert("Wrong login!");
  }
}

// LIVE FAKE STATS
setInterval(function(){
  document.getElementById("users").innerText =
    "👥 Users: " + Math.floor(Math.random()*5000);

  document.getElementById("profit").innerText =
    "💰 Profit: $" + Math.floor(Math.random()*10000);

  document.getElementById("trades").innerText =
    "📊 Trades: " + Math.floor(Math.random()*1000);
},2000);
</script>

</body>
</html>

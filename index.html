<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
body {
  background: #3b5998;
  font-family: Arial;
}

.box {
  width: 300px;
  margin: 100px auto;
  background: white;
  padding: 20px;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
}

button {
  width: 95%;
  padding: 10px;
  background: blue;
  color: white;
  border: none;
}

a {
  display: block;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

<a href="#">Create Account</a>
<a href="#">Forgot Password?</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.container {
    width: 350px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: white;
}

/* Title */
.title {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    margin-bottom: 20px;
    color: #ccc;
}

/* Tabs */
.tabs {
    display: flex;
    margin-bottom: 15px;
}

.tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
}

.tab.active {
    background: #00ffcc;
    color: black;
    font-weight: bold;
}

/* Inputs */
.input-group {
    margin: 12px 0;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg,#00ffcc,#00b894);
    color: black;
    font-weight: bold;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Link */
.link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #00ffcc;
    text-decoration: none;
}

/* Error */
.error {
    color: #ff6b6b;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

    <h2 class="title">Trading</h2>
    <p class="subtitle">হবেন নিঃস্ব, দেখবে বিশ্ব!</p>

    <div class="tabs">
        <div class="tab active" onclick="switchMode('email')">Email</div>
        <div class="tab" onclick="switchMode('phone')">Phone</div>
    </div>

    <!-- REGISTER -->
    <div id="register">

        <div class="input-group">
            <input type="text" id="regEmail" placeholder="Enter Email / Phone">
            <div id="emailError" class="error"></div>
        </div>

        <div class="input-group">
            <input type="password" id="regPass" placeholder="Strong Password">
            <div id="passError" class="error"></div>
        </div>

        <div class="input-group">
            <input type="text" id="invite" readonly>
        </div>

        <button class="btn" onclick="register()">অ্যাকাউন্ট তৈরি করুন</button>

        <div class="link">
            Already have account?
            <a href="#" onclick="showLogin()">Sign In</a>
        </div>

    </div>

    <!-- LOGIN -->
    <div id="login" style="display:none;">

        <div class="input-group">
            <input type="text" id="loginEmail" placeholder="Email / Phone">
        </div>

        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password">
        </div>

        <button class="btn" onclick="login()">Sign In</button>

        <div class="link">
            No account?
            <a href="#" onclick="showRegister()">Create Account</a>
        </div>

    </div>

</div>

<script>

/* Random Invitation Code */
function generateCode() {
    return Math.random().toString(36).substring(2,10).toUpperCase();
}
document.getElementById("invite").value = "INV-" + generateCode();

/* Switch Tabs */
function switchMode(type) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
}

/* Show Login/Register */
function showLogin() {
    document.getElementById("register").style.display = "none";
    document.getElementById("login").style.display = "block";
}
function showRegister() {
    document.getElementById("register").style.display = "block";
    document.getElementById("login").style.display = "none";
}

/* Email Validation */
function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* Strong Password */
function validatePassword(pass) {
    return /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(pass);
}

/* Register */
function register() {
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    let emailError = document.getElementById("emailError");
    let passError = document.getElementById("passError");

    emailError.innerText = "";
    passError.innerText = "";

    if (!validateEmail(email)) {
        emailError.innerText = "Invalid email format!";
        return;
    }

    if (!validatePassword(pass)) {
        passError.innerText = "Password must be strong (A-Z, number, symbol)";
        return;
    }

    localStorage.setItem("user", JSON.stringify({email, pass}));

    alert("Account Created Successfully!");
}

/* Login */
function login() {
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        alert("No account found!");
        return;
    }

    if (user.email === email && user.pass === pass) {
        alert("Login Success 🎉");
    } else {
        alert("Wrong credentials!");
    }
}

</script>

</body>
</html>
